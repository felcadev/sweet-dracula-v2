name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate themes
        run: npm run validate

      - name: Package VSIX
        run: npm run package -- --out sweetdracula-ci.vsix

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: sweetdracula-ci
          path: sweetdracula-ci.vsix
